services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/maxischmaxi/secchat-backend:latest}
    container_name: secchat-backend
    restart: unless-stopped
    environment:
      LISTEN_ADDR: ":8080"
    ports:
      # Nur lokal exponiert — Tor-Hidden-Service greift später über das
      # Compose-Netzwerk bzw. 127.0.0.1 zu.
      - "127.0.0.1:8080:8080"

