services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/maxischmaxi/secchat-backend:latest}
    container_name: secchat-backend
    restart: unless-stopped
    environment:
      LISTEN_ADDR: ":8080"
    ports:
      # Nur lokal gebunden — der Tor-Sidecar erreicht das Backend
      # ueber das Compose-Netzwerk (backend:8080).
      - "127.0.0.1:8080:8080"

  tor:
    build: ./tor
    container_name: secchat-tor
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./tor/torrc:/etc/tor/torrc:ro
      - tor-data:/var/lib/tor

volumes:
  tor-data:
