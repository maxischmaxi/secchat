name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/secchat-backend
  DEPLOY_HOST: 178.104.184.58
  DEPLOY_USER: root
  DEPLOY_DIR: /opt/secchat

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync deploy files
        run: |
          ssh -i ~/.ssh/id_deploy "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '$DEPLOY_DIR'"
          scp -i ~/.ssh/id_deploy -r \
            deploy/docker-compose.yml deploy/tor \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_DIR/"

      - name: Pull, build & restart stack
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_deploy "$DEPLOY_USER@$DEPLOY_HOST" \
            "BACKEND_IMAGE='$IMAGE_REF' GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' DEPLOY_DIR='$DEPLOY_DIR' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_DIR"
          printf 'BACKEND_IMAGE=%s\n' "$BACKEND_IMAGE" > .env
          printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker compose pull
          docker compose up -d --build --remove-orphans
          docker image prune -f
          docker logout ghcr.io
          REMOTE

      - name: Wait for tor hidden service
        run: |
          ssh -i ~/.ssh/id_deploy "$DEPLOY_USER@$DEPLOY_HOST" bash -s <<'REMOTE'
          set -e
          cd /opt/secchat
          for i in $(seq 1 20); do
            if docker compose exec -T tor test -s /var/lib/tor/secchat/hostname 2>/dev/null; then
              echo "tor hidden service is up"
              echo "retrieve .onion via:"
              echo "  ssh root@178.104.184.58 'docker compose -f /opt/secchat/docker-compose.yml exec -T tor cat /var/lib/tor/secchat/hostname'"
              exit 0
            fi
            echo "[$i/20] waiting for tor hidden service..."
            sleep 3
          done
          echo "hidden service did not come up in time"
          docker compose logs --tail 80 tor
          exit 1
          REMOTE
